<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BYINFORGH - Lead Capture Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      display: none;
      font-size: 14px;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BYINFORGH</h1>
    <p class="subtitle">Join our network of businesses</p>

    <form id="contactForm">
      <div class="form-group">
        <label for="fullName">Full Name *</label>
        <input type="text" id="fullName" name="fullName" required>
      </div>

      <div class="form-group">
        <label for="businessName">Business Name *</label>
        <input type="text" id="businessName" name="businessName" required>
      </div>

      <div class="form-group">
        <label for="location">Location *</label>
        <input type="text" id="location" name="location" required>
      </div>

      <div class="form-group">
        <label for="whatYouSell">What You Sell *</label>
        <input type="text" id="whatYouSell" name="whatYouSell" placeholder="e.g., Fashion & Clothing" required>
      </div>

      <div class="form-group">
        <label for="whatsapp">WhatsApp Number *</label>
        <input type="tel" id="whatsapp" name="whatsapp" placeholder="e.g., 0509960980" required>
      </div>

      <div class="form-group">
        <label for="registered">Are you registered? *</label>
        <select id="registered" name="registered" required>
          <option value="">Select an option</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>

      <button type="submit" id="submitBtn">Send</button>

      <div id="message" class="message"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRDVQ-EvofMUKUrbfjyury29Xi45OQSp9H7LF4AFSiJpJld2yp88zGhwJHgwsalwO4/exec';

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      messageDiv.className = 'message';
      messageDiv.textContent = '';

      // Collect form data
      const formData = new FormData(form);
      
      // Create URL-encoded form data (simple request, no preflight needed)
      const params = new URLSearchParams();
      params.append('timestamp', new Date().toLocaleString());
      params.append('fullName', formData.get('fullName'));
      params.append('businessName', formData.get('businessName'));
      params.append('location', formData.get('location'));
      params.append('whatYouSell', formData.get('whatYouSell'));
      params.append('whatsapp', formData.get('whatsapp'));
      params.append('registered', formData.get('registered'));

      try {
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: params.toString()
        });

        // With no-cors mode, we can't read the response, so we assume success after a delay
        setTimeout(() => {
          messageDiv.className = 'message success';
          messageDiv.textContent = '✓ Your details have been received! We\'ll be in touch soon.';
          form.reset();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send';
        }, 1000);

      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '✗ Error: Unable to connect. Please try again.';
        console.error('Error:', error);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send';
      }
    });
  </script>
</body>
</html>
